version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: perfinsight-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  collector:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: perfinsight-collector
    ports:
      - "9000:9000"
    environment:
      DATABASE_URL: "host=db user=${POSTGRES_USER} password=${POSTGRES_PASSWORD} dbname=${POSTGRES_DB} sslmode=disable"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9000/health"]
      interval: 5s
      timeout: 3s
      start_period: 15s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    name: perfinsight_postgres_data